# 国内反代：让手机打开 api.xolome.com（国内 IP），由服务器转发到 Cloudflare Worker
#
# 原因：*.workers.dev / *.pages.dev 在国内运营商网络常超时；
#       api.xolome.com → 120.26.0.177 本机可通。
#
# 生效后投放链接：
#   https://api.xolome.com/survey/
#   https://api.xolome.com/survey/admin
#
# 在 api.xolome.com 的 nginx server { } 内加入：

location /survey/ {
    proxy_http_version 1.1;
    proxy_ssl_server_name on;
    proxy_set_header Host xolome-market-survey.xueyingwang1230.workers.dev;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass https://xolome-market-survey.xueyingwang1230.workers.dev/;
}

# 然后：
#   nginx -t && systemctl reload nginx
#
# 校验：
#   curl -I https://api.xolome.com/survey/
#   curl https://api.xolome.com/survey/api/health
